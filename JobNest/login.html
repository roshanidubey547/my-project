<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background: #f5f9ff;
        color: white;
      }
      .section-project h2 {
        font-size: 32px;
        color: #222;
      }
      .logo span {
        color: rgb(22, 204, 204);
      }
      .logo {
        color: black;
      }

      nav a {
        margin-left: 20px;
        text-decoration: none;
      }
      button {
        padding: 10px 20px;
        border-radius: 8px;
      }
      .btn {
        display: inline-block;
        text-decoration: none;
        background: green;
        color: white;
        border-radius: 5px;
        padding: 10px 20px;
        border-radius: 8px;
        box-shadow: darkgreen;
      }
      .login-section {
        display: flex;
        justify-content: center;
        padding: 40px;
        align-items: center;
        height: calc(100vh - 70px); /* 70px naver ki height*/
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }
      .login-container {
        background: #fff;
        padding: 40px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
      }
      .login-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
      }
      input[type="checkbox"] {
        width: auto;
        margin-right: 6px;
        vertical-align: middle;
      }
      .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        margin: 10px 0 20px;
      }
      .options a {
        text-decoration: none;
        color: #007bff;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 18px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      p {
        text-align: center;
        margin-top: 20px;
      }
      p a {
        color: #007bff;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header class="container">
      <h2 class="logo">Job<span>Portal</span></h2>

      <nav>
        <a href="jobportal.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="companies.html">Companies</a>
        <a href="About.html">About Us</a>
        <a href="contact.html">Contact Us</a>

        <a href="login.html" class="btn">Login</a>
        <a href="register.html" class="btn">Register</a>
      </nav>
    </header>

    <div class="login-section">
      <div class="login-container">
        <h2>Login</h2>

        <form>
          <input type="Email" placeholder="Email Address" required />
          <input type="password" placeholder="password" readonly />
          <div class="options">
            <lable>
              <input type="checkbox" />
              Remember Me
            </lable>
            <a href="#">Forgot Password</a>
          </div>

          <button type="submit">Login</button>
          <p>
            Don't have an account&#63;
            <a href="register.html">Register</a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
