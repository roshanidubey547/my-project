<!doctype html>
<html lang="en">
  <head>
    <title>calculator webpage</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        background: #070d1f;
        color: white;
      }
      /*navbar*/

      nav {
        width: 100%;
        height: 80px;
        padding: 0 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .logo i {
        color: #5d8dff;
        margin-right: 8px;
      }
      .blue {
        color: #5d8dff;
      }

      nav ul {
        display: flex;
        list-style: none;
        gap: 50px;
      }

      nav ul li a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        transition: 0.3s;
      }
      nav ul li a:hover,
      .active {
        color: #5d8dff;
      }

      .contact-btn {
        background: #6d5dfc;
        color: white;
        border: none;
        padding: 15px 28px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }
      .contact-btn:hover {
        background: #8b7cff;
      }
      /*hero*/
      .hero {
        text-align: center;
        padding: 50px 20px;
      }
      .hero h2 {
        font-size: 60px;
        margin-bottom: 10px;
        color: #6b3cff;
        padding-top: -40px;
      }
      .hero h1 span {
        color: #bfbfbf;
        font-size: 22px;
        margin-bottom: 40px;
      }

      /*calculator*/

      .calculator {
        width: 500px;
        height: auto;
        margin: auto;
        background: #111827;
        padding: 18px;
        border-radius: 20px;
        border: 2px solid #5d5dfc;
      }

      .display {
        height: 150px;
        background: #293447;
        border-radius: 15px;
        text-align: right; /*number right side se likhega*/
        padding: 20px;
        margin-bottom: 20px;
      }
      .history {
        color: #cfcfcf;
        font-size: 30px;
      }
      .result {
        font-size: 70px;
        margin-top: 10px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }

      .buttons button {
        height: 85px;
        font-size: 30px;
        border: none;
        border-radius: 30px;
        background: #222d40;
        color: white;
        cursor: pointer;
      }
      /* button:hover {
        background: #444;
      } */

      .operator {
        background: #6b3cff !important;
      }
      .red {
        background: #d84b75 !important;
      }
      .orange {
        background: #ef8d22 !important;
      }
      .equal {
        background: #17c79b !important;
      }
      .zero {
        grid-column: span 2;
      }

      /*fotter*/
      footer {
        text-align: center;
        padding: 30px;
        color: #bdbdbd;
        font-size: 18px;
      }
      footer span {
        color: #4f8cff;
      }
    </style>
  </head>
  <body>
    <!--navbar-->
    <nav>
      <div class="logo">
        <i class="fa-solid fa-calculator"></i>
        <span>my <span class="blue">calculator</span></span>
      </div>

      <ul>
        <li><a href="../calulator website/index.html">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">projects</a></li>
        <li><a href="#">calculator</a></li>
      </ul>

      <button class="contact-btn">contact me</button>
    </nav>

    <!--hero-->
    <section class="hero">
      <h2>My Calculator</h2>
      <p>Simple &bull; Fast &bull; Accurate</p>

      <!--calculator-->

      <div class="calculator">
        <div class="display">
          <div class="history">125+67</div>
          <div class="result">192</div>
        </div>

        <div class="buttons">
          <button class="red">AC</button>
          <button class="orange">DEL</button>
          <button>%</button>
          <button class="operator">&divide;</button>

          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button class="operator">&times;</button>

          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button class="operator">-</button>

          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button class="operator">+</button>

          <button class="zero">0</button>
          <button>.</button>
          <button class="equal">=</button>
        </div>
      </div>
    </section>

    <footer>
      &copy; 2026 <span>Roshani Dubey</span>. All rights reserved.
    </footer>
  </body>
</html>
