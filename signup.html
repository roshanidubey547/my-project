<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }
      .back-home {
        position: absolute;
        top: 20px;
        left: 20px;
        background: white;
        text-decoration: none;
        color: #4f6df5;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgb(0, 0, 0, 0.2);
        transition: 0.3s;
      }
      .back-home:hover {
        background: #4f6df5;
        color: white;
      }

      .signup-box {
        width: 350px;
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgb(0, 0, 0, 0.2);
        text-align: center;
      }
      .signup-box h2 {
        margin-bottom: 20px;
      }
      .signup-box input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
      }
      .signup-box button {
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      .signup-box button:hover {
        background: #0056b3;
      }
      .signup-box p {
        margin-top: 15px;
      }
      .signup-box a {
        color: #007bff;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <a href="../index.html" class="back-home">Back to Home</a>
    <div class="signup-box">
      <h2>Create Account</h2>

      <form>
        <input type="text" placeholder="Full Name" required autofocus />
        <input type="email" placeholder="Email Address" required autofocus />
        <input type="password" placeholder="password" required autofocus />
        <input
          type="password"
          placeholder="Confirm password"
          required
          autofocus
        />

        <button type="submit">Sign Up</button>

        <p>
          Already have an account&#63;
          <a href="./login.html">Login</a>
        </p>
      </form>
    </div>
  </body>
</html>
