<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #b7c8ff, #d9c2ff);
      }
      .back-home {
        position: absolute;
        top: 20px;
        left: 20px;
        background: white;
        text-decoration: none;
        color: #4f6df5;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgb(0, 0, 0, 0.2);
        transition: 0.3s;
      }
      .back-home:hover {
        background: #4f6df5;
        color: white;
      }

      .container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .login-box {
        width: 420px;
        background: #fff;
        border-radius: 20px;
        padding: 40px 35px;
        text-align: center;
        box-shadow: 0 15px 40px rgb(0, 0, 0, 0.15);
      }
      .icon {
        width: 90px;
        height: 90px;
        background: #5b5df8;
        border-radius: 50px;
        margin: 0 auto 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .icon i {
        color: #777;
        margin-bottom: 30px;
      }
      h1 {
        font-size: 42px;
        margin-bottom: 10px;
        color: #222;
      }
      p {
        color: #777;
        margin-bottom: 30px;
      }
      .input-box {
        display: flex;
        align-items: center;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
      }
      .input-box i {
        color: #888;
        font-size: 18px;
      }
      .input-box input {
        width: 100%;
        border: none;
        outline: none;
        font-size: 16px;
        margin-left: 12px;
        background: transparent;
      }
      button {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(to right, #4f6df5, #7a4df3);
        color: #fff;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        transform: scale(1.03);
      }
      .signup {
        margin-top: 25px;
        color: #666;
        font-size: 16px;
      }
      .signup a {
        text-decoration: none;
        color: #5b5df8;
        font-weight: bold;
      }
      .signup a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <a href="../index.html" class="back-home">Back to Home</a>

    <div class="container">
      <div class="login-box">
        <div class="icon">
          <i class="fa-solid fa-user"></i>
        </div>

        <h1>Login</h1>
        <p>Welcom back! please login to your account</p>

        <div class="input-box">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" placeholder="Email Address" required autofocus />
        </div>

        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input
            type="password"
            placeholder="password"
            required
            autofocus
            maxlength="6"
            minlength="6"
          />
          <i class="fa-solid fa-eye-slash"></i>
        </div>

        <button>Login</button>

        <div class="signup">
          Don't have an account&#63;
          <a href="#sign up"></a>
        </div>
      </div>
    </div>
  </body>
</html>
